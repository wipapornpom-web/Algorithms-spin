<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Algorithm Spin Challenge - Drag Pointer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <video id="camera" autoplay playsinline muted></video>
  <div class="cameraShade"></div>

  <div id="pointer" class="pointer">👆</div>
  <div id="gestureStatus" class="gesture-status">กำลังเปิดกล้อง...</div>

  <main id="app">
    <section id="wheelScreen" class="screen active">
      <div class="topbar">
        <div class="score">⭐ <span id="score">0</span></div>
        <div class="title">Algorithm Spin Challenge</div>
        <button id="resetBtn" class="miniBtn">เริ่มใหม่</button>
      </div>

      <div class="robotSpeech" id="robotSpeech">🤖 ใช้นิ้วชี้จีบที่ปุ่มกลางวงล้อ เพื่อสุ่มภารกิจ</div>

      <div class="wheelWrap">
        <div id="wheel" class="wheel"></div>
        <div id="spinTarget" class="spinTarget">จีบ<br>เพื่อหมุน</div>
      </div>
      <div class="hint">กล้องเต็มจอ • ใช้นิ้วชี้ + จีบนิ้วโป้ง เพื่อจับ/ลาก/ปล่อย</div>
    </section>

    <section id="gameScreen" class="screen">
      <div class="topbar">
        <button id="backBtn" class="miniBtn">↩ วงล้อ</button>
        <div id="gameTitle" class="title">ภารกิจ</div>
        <div class="score">⭐ <span id="score2">0</span></div>
      </div>

      <div id="gameInstruction" class="robotSpeech">🤖 ลากรูปภาพไปวางตามลำดับ</div>
      <div id="playArea" class="playArea"></div>
      <div class="bottomActions">
        <div id="checkTarget" class="checkTarget">จีบที่นี่<br>ตรวจคำตอบ</div>
        <div id="nextTarget" class="nextTarget hidden">กลับวงล้อ</div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <canvas id="confetti"></canvas>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="script.js"></script>
</body>
</html>
